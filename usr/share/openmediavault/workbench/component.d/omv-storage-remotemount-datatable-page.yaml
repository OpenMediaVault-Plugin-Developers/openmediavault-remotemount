version: "1.0"
type: component
data:
  name: omv-storage-remotemount-datatable-page
  type: datatablePage
  config:
    autoReload: 10000
    hasSearchField: true
    stateId: 2af992ea-5372-11ec-ab69-e35c37fe07e5
    sorters:
      - dir: asc
        prop: name
    store:
      proxy:
        service: RemoteMount
        get:
          method: getList
    columns:
      - name: _("Type")
        prop: mounttype
        sortable: true
        flexGrow: 1
      - name: _("Name")
        prop: name
        sortable: true
        flexGrow: 1
      - name: _("Server")
        prop: server
        sortable: true
        flexGrow: 2
      - name: _("Share")
        prop: sharename
        sortable: true
        flexGrow: 2
      - name: _("Mounted")
        prop: mounted
        sortable: true
        flexGrow: 1
        cellTemplateName: checkIcon
      - name: _("Monitored")
        prop: monitored
        sortable: true
        flexGrow: 1
        cellTemplateName: checkIcon
      - name: _("Shared")
        prop: shared
        sortable: true
        flexGrow: 1
        cellTemplateName: checkIcon
    actions:
      - template: create
        execute:
          type: url
          url: "/storage/remotemount/create"
      - template: edit
        execute:
          type: url
          url: "/storage/remotemount/edit/{{ _selected[0].uuid }}"
      - template: delete
        execute:
          type: request
          request:
            service: RemoteMount
            method: delete
            params:
              uuid: "{{ _selected[0].uuid }}"
      - type: iconButton
        tooltip: _("Mount")
        icon: mdi:play-outline
        execute:
          type: request
          request:
            service: RemoteMount
            method: mount
            params:
              uuid: "{{ _selected[0].uuid }}"
              action: "start"
            task: false
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
          constraint:
            - operator: falsy
              arg0:
                prop: mounted
      - type: iconButton
        tooltip: _("Unmount")
        icon: mdi:eject-outline
        execute:
          type: request
          request:
            service: RemoteMount
            method: mount
            params:
              uuid: "{{ _selected[0].uuid }}"
              action: "stop"
            task: false
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
          constraint:
            - operator: truthy
              arg0:
                prop: mounted
      - type: iconButton
        tooltip: _("Show logs")
        icon: mdi:file-document-outline
        enabledConstraints:
          minSelected: 1
          maxSelected: 1
        execute:
          type: taskDialog
          taskDialog:
            config:
              title: _("Mount logs")
              startOnInit: true
              request:
                service: RemoteMount
                method: getLogs
                params:
                  uuid: "{{ _selected[0].uuid }}"
      - type: menu
        icon: mdi:link
        tooltip: _("Docs")
        actions:
          - text: _("omv-extras wiki")
            icon: mdi:link-box
            execute:
              type: url
              url: "/externalRedirect/https%3A%2F%2Fwiki.omv-extras.org%2Fdoku.php%3Fid%3Domv8%3Aomv8_plugins%3Aremote_mount"
