version: "1.0"
type: component
data:
  name: omv-storage-remotemount-form-page
  type: formPage
  config:
    request:
      service: RemoteMount
      get:
        method: get
        params:
          uuid: "{{ _routeParams.uuid }}"
      post:
        method: set
    fields:
      - type: confObjUuid
      - type: hidden
        name: mntentref
        value: "{{ newconfobjuuid }}"
      - type: select
        name: mounttype
        label: _("Mount type")
        value: "cifs"
        store:
          data:
            - ['nfs', _("NFS")]
            - ['cifs', _("SMB/CIFS")]
            - ['davfs', _("WebDAV (davfs)")]
            - ['rclone', _("rclone")]
      - type: select
        name: rclonetype
        label: _("Protocol")
        value: "s3"
        store:
          data:
            - ['s3', _("Amazon S3 / S3-Compatible")]
            - ['sftp', _("SFTP")]
            - ['ftp', _("FTP")]
            - ['webdav', _("WebDAV")]
            - ['drive', _("Google Drive (pre-configured rclone remote)")]
            - ['onedrive', _("OneDrive (pre-configured rclone remote)")]
        modifiers:
          - type: hidden
            constraint:
              operator: ne
              arg0:
                prop: mounttype
              arg1: "rclone"
      - type: divider
        title: _("Connection")
      - type: textInput
        name: name
        label: _("Name")
        value: ""
        modifiers:
          type: disabled
          constraint:
            operator: ne
            arg0:
              prop: mntentref
            arg1: "{{ newconfobjuuid }}"
        validators:
          required: true
          patternType: wordChars
      - type: textInput
        name: server
        label: _("Server")
        value: ""
        hint: _("SMB/CIFS or NFS — hostname or IP.<br/>WebDAV (davfs) — full URL (e.g. https://example.com/dav).<br/>S3 — endpoint URL (blank for AWS).<br/>SFTP/FTP — hostname[:port].<br/>Google Drive/OneDrive — name of a pre-configured rclone remote (run rclone config first).")
      - type: textInput
        name: sharename
        label: _("Share / Path")
        value: ""
        hint: _("SMB/CIFS — share name<br/>NFS — export path<br/>S3 — bucket name<br/>SFTP/FTP — remote directory path<br/>WebDAV — subdirectory (optional)<br/>Drive/OneDrive — folder path (optional)")
        modifiers:
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "davfs"
      - type: checkbox
        name: nfs4
        label: _("NFS v4")
        value: false
        hint: _("Enable to use NFSv4, disable for NFSv3.")
        modifiers:
          - type: hidden
            constraint:
              operator: ne
              arg0:
                prop: mounttype
              arg1: "nfs"
      - type: divider
        title: _("Credentials")
      - type: textInput
        name: username
        label: _("Username")
        value: ""
        hint: _("SMB/CIFS or WebDAV — username (leave blank for guest)<br/>S3 — access key ID<br/>SFTP/FTP — username.")
        modifiers:
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "nfs"
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: rclonetype
              arg1: "drive"
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: rclonetype
              arg1: "onedrive"
      - type: passwordInput
        name: password
        label: _("Password")
        value: ""
        hint: _("SMB/CIFS or WebDAV — password (leave blank for guest)<br>S3 — secret access key<br/>SFTP/FTP — password (auto-obscured on save).")
        modifiers:
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "nfs"
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: rclonetype
              arg1: "drive"
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: rclonetype
              arg1: "onedrive"
      - type: divider
        title: _("Advanced")
      - type: textInput
        name: options
        label: _("Options")
        value: "iocharset=utf8,vers=3.0,nofail"
        hint: _("SMB/CIFS see <a href='https://linux.die.net/man/8/mount.cifs' target='_blank'>mount.cifs</a><br/>NFS see <a href='https://linux.die.net/man/8/mount.nfs' target='_blank'>mount.nfs</a><br/>WebDAV see <a href='https://linux.die.net/man/8/mount.davfs' target='_blank'>mount.davfs</a><br/>rclone — extra mount flags (e.g. --vfs-cache-mode=writes).")
        modifiers:
          - type: value
            typeConfig: "iocharset=utf8,vers=3.0,nofail"
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "cifs"
          - type: value
            typeConfig: "defaults,nofail,file_mode=777,dir_mode=777"
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "davfs"
          - type: value
            typeConfig: "rsize=8192,wsize=8192,timeo=14,nofail"
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "nfs"
          - type: value
            typeConfig: "allow_other,use_path_request_style"
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "s3fs"
          - type: value
            typeConfig: "--vfs-cache-mode=off"
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "rclone"
    buttons:
      - template: submit
        execute:
          type: url
          url: "/storage/remotemount"
      - template: cancel
        execute:
          type: url
          url: "/storage/remotemount"
