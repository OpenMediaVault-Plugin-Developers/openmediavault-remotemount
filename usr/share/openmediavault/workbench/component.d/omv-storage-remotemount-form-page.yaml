version: "1.0"
type: component
data:
  name: omv-storage-remotemount-form-page
  type: formPage
  config:
    request:
      service: RemoteMount
      get:
        method: get
        params:
          uuid: "{{ _routeParams.uuid }}"
      post:
        method: set
    fields:
      - type: confObjUuid
      - type: hidden
        name: mntentref
        value: "{{ newconfobjuuid }}"
      - type: select
        name: mounttype
        label: _("Mount type")
        value: "cifs"
        store:
          data:
            - ['nfs', _('NFS')]
            - ['cifs', _('SMB/CIFS')]
            - ['davfs', _('DAVFS')]
            - ['rclone', _('rclone')]
      - type: select
        name: rclonetype
        label: _("Protocol")
        value: "s3"
        store:
          data:
            - ['s3', _('S3')]
            - ['sftp', _('SFTP')]
            - ['ftp', _('FTP')]
            - ['webdav', _('WebDAV')]
            - ['drive', _('Google Drive')]
            - ['onedrive', _('OneDrive')]
        modifiers:
          - type: hidden
            constraint:
              operator: ne
              arg0:
                prop: mounttype
              arg1: "rclone"
      - type: textInput
        name: name
        label: _("Name")
        value: ""
        modifiers:
          type: disabled
          constraint:
            operator: ne
            arg0:
              prop: mntentref
            arg1: "{{ newconfobjuuid }}"
        validators:
          required: true
          patternType: wordChars
      - type: textInput
        name: server
        label: _("Server")
        value: ""
        hint: _('SMB/CIFS/NFS/SFTP/FTP hostname or hostname:port. For S3 use endpoint URL (blank for AWS). For WebDAV use full URL. For Google Drive/OneDrive use rclone remote name.')
      - type: textInput
        name: sharename
        label: _("Share")
        value: ""
        hint: _('SMB/CIFS or NFS v4 share name. NFS v3 export path. S3 bucket name. SFTP/FTP remote path. WebDAV subdirectory (optional). Google Drive/OneDrive folder path (optional).')
        modifiers:
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "davfs"
      - type: checkbox
        name: nfs4
        label: _("NFS v4")
        value: false
        hint: _('Will use NFS v3 if unchecked and NFS v4 if checked.')
        modifiers:
          - type: hidden
            constraint:
              operator: ne
              arg0:
                prop: mounttype
              arg1: "nfs"
      - type: textInput
        name: username
        label: _("Username")
        value: ""
        hint: _('Leave blank for guest access. For S3 use access key ID. For SFTP/FTP/WebDAV use username. Not used for Google Drive/OneDrive.')
        modifiers:
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "nfs"
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: rclonetype
              arg1: "drive"
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: rclonetype
              arg1: "onedrive"
      - type: passwordInput
        name: password
        label: _("Password")
        value: ""
        hint: _('For S3 use secret access key. For SFTP/FTP/WebDAV use password (auto-obscured on save). Not used for Google Drive/OneDrive (configure with rclone config instead).')
        modifiers:
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "nfs"
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: rclonetype
              arg1: "drive"
          - type: hidden
            constraint:
              operator: eq
              arg0:
                prop: rclonetype
              arg1: "onedrive"
      - type: textInput
        name: options
        label: _("Options")
        value: "iocharset=utf8,vers=3.0,nofail"
        hint: _('SMB/CIFS see <a href="https://linux.die.net/man/8/mount.cifs" target="_blank">mount.cifs</a>. NFS see <a href="https://linux.die.net/man/8/mount.nfs" target="_blank">mount.nfs</a>. WebDAV (davfs) see <a href="https://linux.die.net/man/8/mount.davfs" target="_blank">mount.davfs</a>. rclone extra mount flags (e.g. --vfs-cache-mode=writes).')
        modifiers:
          - type: value
            typeConfig: "iocharset=utf8,vers=3.0,nofail"
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "cifs"
          - type: value
            typeConfig: "defaults,nofail,file_mode=777,dir_mode=777"
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "davfs"
          - type: value
            typeConfig: "rsize=8192,wsize=8192,timeo=14,nofail"
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "nfs"
          - type: value
            typeConfig: "allow_other,use_path_request_style"
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "s3fs"
          - type: value
            typeConfig: "--vfs-cache-mode=off"
            constraint:
              operator: eq
              arg0:
                prop: mounttype
              arg1: "rclone"
    buttons:
      - template: submit
        execute:
          type: url
          url: "/storage/remotemount"
      - template: cancel
        execute:
          type: url
          url: "/storage/remotemount"
